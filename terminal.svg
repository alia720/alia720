<svg width="600" height="330" viewBox="0 0 600 330" xmlns="http://www.w3.org/2000/svg">

  <!-- Window shadow -->
  <rect x="4" y="6" width="600" height="330" rx="12" fill="#000000" opacity="0.4"/>

  <!-- Window background -->
  <rect width="600" height="330" rx="12" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="600" height="38" rx="12" fill="#161b22"/>
  <rect y="26" width="600" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="7" fill="#febc2e"/>
  <circle cx="66" cy="19" r="7" fill="#28c840"/>

  <!-- Title -->
  <text x="300" y="24" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8b949e" text-anchor="middle">ali@ucalgary: ~</text>

  <!-- Separator line -->
  <line x1="0" y1="38" x2="600" y2="38" stroke="#21262d" stroke-width="1"/>

  <!-- Terminal content -->
  <g font-family="'Courier New', Courier, monospace" font-size="13">

    <!-- whoami -->
    <text x="20" y="66">
      <tspan fill="#00b4d8">ali@ucalgary</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#90e0ef">~</tspan><tspan fill="#8b949e">$</tspan>
      <tspan fill="#e6edf3"> whoami</tspan>
    </text>
    <text x="20" y="86" fill="#8b949e">  ali — CS @ University of Calgary</text>

    <!-- cat /etc/focus -->
    <text x="20" y="114">
      <tspan fill="#00b4d8">ali@ucalgary</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#90e0ef">~</tspan><tspan fill="#8b949e">$</tspan>
      <tspan fill="#e6edf3"> cat /etc/focus</tspan>
    </text>
    <text x="20" y="134" fill="#8b949e">  networking &amp; systems</text>
    <text x="20" y="154" fill="#8b949e">  full-stack development</text>

    <!-- ping hobbies -->
    <text x="20" y="182">
      <tspan fill="#00b4d8">ali@ucalgary</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#90e0ef">~</tspan><tspan fill="#8b949e">$</tspan>
      <tspan fill="#e6edf3"> ping hobbies -c 3</tspan>
    </text>
    <text x="20" y="202" fill="#8b949e">  64 bytes: rhythm games       ttl=64 time=0.1 ms</text>
    <text x="20" y="222" fill="#8b949e">  64 bytes: exploring new tech  ttl=64 time=0.1 ms</text>
    <text x="20" y="242" fill="#8b949e">  64 bytes: building projects   ttl=64 time=0.2 ms</text>
    <text x="20" y="262" fill="#caf0f8">  --- 3 packets transmitted, 0% packet loss ---</text>

    <!-- cursor line -->
    <text x="20" y="295">
      <tspan fill="#00b4d8">ali@ucalgary</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#90e0ef">~</tspan><tspan fill="#8b949e">$</tspan>
      <tspan fill="#e6edf3"> </tspan>
    </text>
    <!-- blinking cursor block -->
    <rect x="163" y="280" width="8" height="16" fill="#00b4d8">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
